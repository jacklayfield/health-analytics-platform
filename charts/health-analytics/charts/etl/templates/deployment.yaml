apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-etl" .Release.Name }}
  labels:
    app: {{ printf "%s-etl" .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ printf "%s-etl" .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ printf "%s-etl" .Release.Name }}
    spec:
      containers:
        - name: etl
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          resources: {{ toYaml .Values.resources | nindent 10 }}
